<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Editor</title>
    <style>
        :root { --bg: #181818; --header: #252525; --text: #d4d4d4; --border: #333; --input: #333; }
        body.light { --bg: #ffffff; --header: #f0f0f0; --text: #333; --border: #ccc; --input: #eee; }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg); color: var(--text); transition: background 0.2s; }
        body:not(.light) a { color: cyan; }
        header { padding: 8px 20px; background: var(--header); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        input[type="text"] { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 4px; outline: none; width: 180px; font-size: 0.85rem; }
        textarea { flex-grow: 1; padding: 25px; background: transparent; color: var(--text); border: none; outline: none; font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 15px; line-height: 1.6; resize: none; }
        
        .controls { display: flex; gap: 15px; align-items: center; font-size: 0.8rem; opacity: 0.8; }
        button { cursor: pointer; background: var(--border); border: none; color: var(--text); padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; }
        kbd { background: var(--border); padding: 2px 4px; border-radius: 3px; font-family: sans-serif; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div>
        <input type="text" id="filename" value="untitled.html" spellcheck="false">
    </div>
    <a href="javascript:about();">how I made this editor</a>
    <div class="controls">
        <span><kbd>⌘/Ctrl</kbd> + <kbd>S</kbd> to Save</span>
        <button id="themeToggle">🌓 Theme</button>
    </div>
</header>

<textarea id="editor" placeholder="Start typing your thoughts..." spellcheck="false"></textarea>

<script>

    function about() {
        alert("This editor was made using gemini. I opened gemini.google.com and used the following prompts:\n\n1. I'd like to make a client-side app that runs locally without a server. \n\n2.  I'd like it to be a plain text editor, with a custom file name and Ctrl+S to save it with that file name on my computer \n\n3.  I'd like it to work from file:/// URLs \n\n4.  Can we also support Cmd+S (for Mac users)? \n\nI then copied the final response, saved it as a file, and since I wanted you to use it too put it here.");
    }

    const editor = document.getElementById('editor');
    const filenameInput = document.getElementById('filename');
    const themeToggle = document.getElementById('themeToggle');

    // 1. Persistence: Load saved text and theme
    editor.value = localStorage.getItem('local-editor-content') || '';
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    // 2. Auto-save content to LocalStorage (Safety Net)
    editor.addEventListener('input', () => {
        localStorage.setItem('local-editor-content', editor.value);
    });

    // 3. Theme Toggle Logic
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light');
        const isLight = document.body.classList.contains('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    // 4. Save Function (The "Invisible Link" trick for file:/// URLs)
    function triggerDownload() {
        const blob = new Blob([editor.value], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        a.href = url;
        a.download = filenameInput.value || 'note.txt';
        a.click();
        
        URL.revokeObjectURL(url);
    }

    // 5. Keyboard Shortcut (Supports Cmd on Mac & Ctrl on PC)
    window.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            triggerDownload();
        }
    });
</script>

</body>
</html>
